name: pally
description: Pally (小伴) — Kids AI Tutor App
publish_to: 'none'
version: 1.0.3+9

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.0

  # Data / serialisation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Fonts
  google_fonts: ^6.2.1

  # Networking
  # Capped below 5.10.0: it added DioExceptionType.transformTimeout, which is not
  # handled by the exhaustive DioException switches (api_client / pally_error) and
  # broke compilation. The committed pubspec.lock is the real reproducibility fix;
  # this ceiling documents the known-incompatible boundary. Lifting it means adding
  # explicit handling for the new exception type first.
  dio: ">=5.7.0 <5.10.0"

  # File picking / camera
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  permission_handler: ^11.3.1
  google_mlkit_text_recognition: ^0.13.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  logger: ^2.4.0
  package_info_plus: ^9.0.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  # Local database
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.4
  local_auth: ^2.3.0
  device_info_plus: ^10.1.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Share weekly report
  share_plus: ^10.1.4
  url_launcher: ^6.3.2
  sentry_flutter: ^9.21.0
  flutter_math_fork: ^0.7.4
  cunning_document_scanner: ^1.2.3
  just_audio: ^0.10.5
  posthog_flutter: ^5.26.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.4

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  go_router_builder: ^2.7.1
  drift_dev: ^2.20.3
  sentry_dart_plugin: ^3.4.0

# ── App launcher icons ────────────────────────────────────────────────────────
# Regenerate after changing the source art:  dart run flutter_launcher_icons
# Source is the Apalchi brand mark (yellow Mochi + graduation cap on purple).
# iOS icons must be opaque, so alpha is flattened onto the brand purple.
flutter_launcher_icons:
  image_path: "assets/icon/apalchi_icon_1024.png"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#7042ED"
  android: true
  adaptive_icon_background: "#7042ED"
  adaptive_icon_foreground: "assets/icon/apalchi_icon_1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/

  fonts:
    - family: Nunito
      fonts:
        - asset: test/fonts/Nunito-Regular.ttf

# ── Sentry debug symbols ───────────────────────────────────────────────────────
# Reads org / project / auth_token from env vars — NEVER hardcode the token.
# Set before running `dart run sentry_dart_plugin`:
#   SENTRY_ORG          = memoly
#   SENTRY_PROJECT      = memoly-flutter-prod         (or memoly-flutter-dev)
#   SENTRY_AUTH_TOKEN   = <secret — CI secret or local shell only>
#
# Build + upload (production):
#   flutter build apk --release \
#     --dart-define=APP_ENV=production \
#     --obfuscate --split-debug-info=build/symbols
#   SENTRY_ORG=memoly SENTRY_PROJECT=memoly-flutter-prod \
#   SENTRY_AUTH_TOKEN=<token> dart run sentry_dart_plugin
sentry:
  upload_debug_symbols: true
  upload_source_maps: false   # mobile app, not web
  # project / org / auth_token are read from the env vars above.
  # If your sentry_dart_plugin version requires them inline,
  # use CI substitution — never commit the auth token.

# ── Native splash screen ──────────────────────────────────────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  # Brand purple (matches the Flutter splash_screen.dart background) so the
  # native → Flutter handoff is seamless — no black flash. Use the padded
  # mascot (mochi.png), not the full-frame studio render (base.png): on Android
  # 12 the icon is masked to a circle, and base.png's edge-to-edge sprout/face
  # got cropped on a black field. mochi.png has transparent padding so the whole
  # mascot stays inside the circle.
  color: "#7042ED"
  image: assets/images/splash_mochi.png
  android_12:
    color: "#7042ED"
    image: assets/images/splash_mochi.png
