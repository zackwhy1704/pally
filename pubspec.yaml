name: pally
description: Pally (小伴) — Kids AI Tutor App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.2.3

  # Data / serialisation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Fonts
  google_fonts: ^6.2.1

  # Networking
  dio: ^5.7.0

  # File picking / camera
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  camera: ^0.10.5+9
  permission_handler: ^11.3.1
  google_mlkit_text_recognition: ^0.13.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  logger: ^2.4.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  # Local database
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.4
  local_auth: ^2.3.0
  device_info_plus: ^10.1.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

  # Share weekly report
  share_plus: ^10.1.4
  url_launcher: ^6.3.2
  sentry_flutter: ^9.21.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  go_router_builder: ^2.7.1
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Nunito
      fonts:
        - asset: test/fonts/Nunito-Regular.ttf
