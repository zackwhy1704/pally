name: frontend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      # Needed by the release-bundle gate below (Gradle build). Harmless for analyze/test.
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the SDK the team builds against locally; bump as a
          # deliberate PR rather than auto-tracking stable.
          flutter-version: '3.32.1'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        # @freezed / @riverpod / @JsonSerializable need this before
        # analyze or test will compile.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        # Treat the analyzer's findings as gate-blocking; the project
        # currently ships zero issues so any new info-level finding
        # surfaces in PRs.
        run: flutter analyze

      - name: Test
        # Unit + widget tests. Golden tests are excluded from CI because they
        # were generated on macOS and Linux renders fonts differently, causing
        # pixel-exact comparisons to fail. Run golden tests locally before
        # pushing if you change any visual widget.
        run: flutter test test/unit/ test/widget/ test/widget_test.dart

      - name: Release-bundle build gate
        # analyze + test NEVER run the Android release path, so a plugin that raises its
        # minSdk floor (or an unbuildable NDK pin) stays green here while `flutter build
        # appbundle --release` breaks — the exact gap that shipped a broken release path
        # while CI looked green. This step exercises that path on every push: manifest
        # merge, plugin minSdk floors, and the NDK native-symbol strip. A throwaway
        # keystore lets --release package; the .aab is discarded (this is a BUILD gate,
        # not a release artifact — real signing stays local/deferred to the CI-signing item).
        run: |
          keytool -genkeypair -noprompt -keystore "$RUNNER_TEMP/ci-upload.jks" \
            -alias apalchi -storepass ci_dummy_pw -keypass ci_dummy_pw \
            -keyalg RSA -keysize 2048 -validity 1 -dname "CN=ci, O=ci"
          KEYSTORE_PATH="$RUNNER_TEMP/ci-upload.jks" \
          KEYSTORE_PASSWORD=ci_dummy_pw KEY_PASSWORD=ci_dummy_pw \
            flutter build appbundle --release --dart-define=APP_ENV=production
          # Echo AAB size on every run → size-regression detector. Also the free test of the
          # 'strip fails only on the macOS host' theory: this runs on Linux, so a size well
          # below the local ~125MB (or no "failed to strip" line above) exonerates the host
          # and points at the Flutter strip step; an identical failure confirms it's not host.
          ls -lh build/app/outputs/bundle/release/*.aab

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            test/**/failures/
            coverage/
          retention-days: 7
          if-no-files-found: ignore
