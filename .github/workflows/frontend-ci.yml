name: frontend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the SDK the team builds against locally; bump as a
          # deliberate PR rather than auto-tracking stable.
          flutter-version: '3.32.1'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        # @freezed / @riverpod / @JsonSerializable need this before
        # analyze or test will compile.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        # Treat the analyzer's findings as gate-blocking; the project
        # currently ships zero issues so any new info-level finding
        # surfaces in PRs.
        run: flutter analyze

      - name: Test
        # Unit + widget tests. Golden tests are excluded from CI because they
        # were generated on macOS and Linux renders fonts differently, causing
        # pixel-exact comparisons to fail. Run golden tests locally before
        # pushing if you change any visual widget.
        run: flutter test test/unit/ test/widget/ test/widget_test.dart

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            test/**/failures/
            coverage/
          retention-days: 7
          if-no-files-found: ignore
