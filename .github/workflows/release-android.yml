name: release-android

# Builds a production release APK and uploads Dart/native debug symbols
# to Sentry so crash reports show real file+line frames.
#
# Triggered manually (for controlled releases) or on version tags.
# For day-to-day development use frontend-ci.yml (analyze + test only).
on:
  workflow_dispatch:          # manual trigger from GitHub Actions UI
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.2.3

permissions:
  contents: read

jobs:
  build-and-upload-symbols:
    name: Build release APK + upload Sentry symbols
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Codegen (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test test/unit/ test/widget/ test/widget_test.dart

      # ── Release build ─────────────────────────────────────────────────────
      # --obfuscate removes readable symbol names from the APK binary.
      # --split-debug-info writes the matching symbol files that Sentry
      # needs to de-obfuscate crash stack traces.
      - name: Build release APK (production)
        run: |
          flutter build apk --release \
            --dart-define=APP_ENV=production \
            --obfuscate \
            --split-debug-info=build/symbols

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── Sentry symbol upload ───────────────────────────────────────────────
      # SENTRY_AUTH_TOKEN is a GitHub secret (repo Settings → Secrets).
      # SENTRY_ORG and SENTRY_PROJECT are non-sensitive; hardcoded here.
      - name: Upload debug symbols to Sentry (prod project)
        env:
          SENTRY_ORG: memoly
          SENTRY_PROJECT: memoly-flutter-prod
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: dart run sentry_dart_plugin
