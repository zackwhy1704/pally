plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: 'com.google.gms.google-services'

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.apalchi.app"
    compileSdk 36
    // Pinned, NOT flutter.ndkVersion — the Flutter-default NDK floats with the SDK
    // version, and a mismatch with what the plugins request (27.0.12077973) makes the
    // release native-symbol strip fail (ships unstripped .so → bloated AAB). Every
    // plugin in this app requests 27.0.12077973; pin it so any toolchain strips cleanly.
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.apalchi.app"
        // Pinned, NOT flutter.minSdkVersion — that default floats with the Flutter version
        // (21 on 3.32.1, 24 on 3.44.2), so the release build silently depended on the
        // toolchain: 3.32.1 produced minSdk 21 which fails the mobile_scanner (minSdk 23)
        // manifest merge. 24 is the floor the only shipped build actually exercised; it also
        // clears mobile_scanner. Lower it deliberately (and test there) if a real API<24
        // population appears.
        minSdkVersion 24
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "${System.getProperty('user.home')}/apalchi-release.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias "apalchi"
            keyPassword System.getenv("KEY_PASSWORD") ?: ""
        }
    }

    buildTypes {
        release {
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

// Force a newer kotlinx-metadata-jvm so R8 can process Kotlin 2.1.0 class
// files. AGP 8.3 ships R8 with metadata support capped at 2.0.0; this
// forces the version that understands 2.1.0 without requiring a full AGP
// upgrade. Remove once AGP is updated to 8.5+.
configurations.all {
    resolutionStrategy.force 'org.jetbrains.kotlinx:kotlinx-metadata-jvm:0.9.0'
}
